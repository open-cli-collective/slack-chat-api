schema: open-cli-identity/v1
repo: slack-chat-api
binary: slck
goreleaser_config: .goreleaser.yaml
tag:
  prefix: v
  version_scheme: major_minor_run_patch
archives:
  name_template: "slck_v{{ .Version }}_{{ .Os }}_{{ .Arch }}"
packages:
  homebrew:
    canonical_cask: slck
    alias_casks: [slack-chat-cli]
  winget: { id: OpenCLICollective.slack-chat-cli }
  chocolatey: { id: slack-chat-cli }
  linux: { package_name: slck }

# Faithful port of the pre-migration darwin Keychain gate: with the backend
# override unset and a seeded config, the arm64 binary must auto-select the
# macOS Keychain backend. The reusable release.yml's darwin-gate runs this.
keychain_probe:
  env_unset: [SLACK_CHAT_API_KEYRING_BACKEND]
  seed_config:
    path: slack-chat-api/config.yml
    content: |
      credential_ref: slack-chat-api/default
      workspace: smoke
  command: ["--output", "json", "config", "show"]
  output: json
  assertions:
    .backend: keychain
    .backend_source: auto
    .credential_ref: slack-chat-api/default

version_file: version.txt
