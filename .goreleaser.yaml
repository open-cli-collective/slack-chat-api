version: 2

project_name: slack-chat-cli

before:
  hooks:
    # a mutating tidy must fail the release, not build from a dirty tree
    - sh -c "go mod tidy && git diff --exit-code go.mod go.sum"
    - go test ./...

# INT-446: darwin builds with CGO so 99designs/keyring's Keychain backend
# (//go:build darwin && cgo) is compiled in; without it credstore fails
# closed on macOS. linux/windows stay CGO-off static (their keyring
# backends are pure Go; cgo there would regress glibc portability).
# Split is by GOOS only — both darwin amd64 and arm64 are still produced.
builds:
  - id: slck-darwin
    main: ./cmd/slck
    binary: slck
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    overrides:
      - goos: darwin
        goarch: amd64
        goamd64: v1
        env:
          - CGO_ENABLED=1
          - "CC=xcrun clang -arch x86_64"
      - goos: darwin
        goarch: arm64
        goarm64: v8.0
        env:
          - CGO_ENABLED=1
          - "CC=xcrun clang -arch arm64"
    ldflags:
      - -s -w
      - -X github.com/open-cli-collective/slack-chat-api/internal/version.Version={{.Version}}
      - -X github.com/open-cli-collective/slack-chat-api/internal/version.Commit={{.Commit}}
      - -X github.com/open-cli-collective/slack-chat-api/internal/version.Date={{.Date}}
    # macOS code-signing — stable DR so Keychain "Always Allow" survives brew upgrade
    # (cli-common distribution.md §2A). Logic + identity live in open-cli-collective/.github
    # (macos-codesign-setup), which exports CODESIGN_DARWIN_SCRIPT (absolute). Unset in
    # local builds → signing skipped.
    hooks:
      post:
        - cmd: bash -c 'f="${CODESIGN_DARWIN_SCRIPT:-}"; [ -n "$f" ] && [ -x "$f" ] && exec "$f" "$0" "$1"; echo "skip codesign (no CODESIGN_DARWIN_SCRIPT)"' "{{ .Path }}" "{{ .Os }}"
  - id: slck-unix-win
    main: ./cmd/slck
    binary: slck
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/open-cli-collective/slack-chat-api/internal/version.Version={{.Version}}
      - -X github.com/open-cli-collective/slack-chat-api/internal/version.Commit={{.Commit}}
      - -X github.com/open-cli-collective/slack-chat-api/internal/version.Date={{.Date}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    # Use binary name with v prefix for archive filenames
    name_template: "slck_v{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

# Linux packages (.deb and .rpm)
nfpms:
  - id: slck
    # deb/rpm are linux-only: pull the static CGO-off build, never darwin.
    # `ids` (the v2 build-id filter) — `builds` is deprecated and fails
    # `goreleaser check`.
    ids:
      - slck-unix-win
    package_name: slck
    vendor: Open CLI Collective
    homepage: https://github.com/open-cli-collective/slack-chat-api
    maintainer: Open CLI Collective <https://github.com/open-cli-collective>
    description: Command-line interface for Slack
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: LICENSE
        dst: /usr/share/licenses/slck/LICENSE

checksum:
  name_template: "checksums.txt"

release:
  # idempotent re-runs: a retried release overwrites the same assets instead of
  # erroring on "asset already exists" (release-preflight hard-requires this).
  replace_existing_artifacts: true

# Canonical Homebrew cask. skip_upload: true → goreleaser RENDERS the cask into
# dist/ but does NOT push it; the reusable release workflow's homebrew-alias step
# is the single atomic writer that commits the canonical cask + the
# slack-chat-cli alias to the tap in one push. No `token:` here — the tap token
# belongs only to that alias job, and skip_upload needs none. goreleaser renders
# both on_macos and on_linux blocks from the build matrix; this is kept as-is
# (matching the prior hand-rolled cask, which also had on_linux — Linuxbrew
# users), per cli-common distribution.md §3 (goreleaser owns the canonical cask).
homebrew_casks:
  - name: slck
    binaries: [slck]
    skip_upload: true
    repository:
      owner: open-cli-collective
      name: homebrew-tap
    homepage: https://github.com/open-cli-collective/slack-chat-api
    description: "Command-line interface for Slack"
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/slck"]
    caveats: |
      To configure slck, run:
        slck init

      Tokens are stored in the OS keyring (Keychain on macOS,
      Credential Manager on Windows, Secret Service on Linux).
      They are never written to a plaintext file.

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "Merge pull request"
  groups:
    - title: Features
      regexp: '^feat:'
      order: 0
    - title: Bug Fixes
      regexp: '^fix:'
      order: 1
    - title: Other
      order: 999
